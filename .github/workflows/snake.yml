name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Platane/snk@v3
        with:
          github_user_name: princegupt1234
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=06B6D4&color_dots=#0F172A,#0C4A6E,#0E7490,#06B6D4,#22D3EE
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=06B6D4&color_dots=#0F172A,#0C4A6E,#0E7490,#06B6D4,#22D3EE
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
